name: vexa_mobile
description: vexa mobile app (roadmap)
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  go_router: ^12.1.1
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.1
  fluttertoast: ^8.2.4
  permission_handler: ^11.1.0
  path_provider: ^2.1.1
  file_picker: ^6.1.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  device_info_plus: ^9.1.2
  package_info_plus: ^5.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  mocktail: ^1.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
