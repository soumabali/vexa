# SSH Manager - API Linting Configuration
# Security-focused Go linting with golangci-lint
# CI integration ready

run:
  timeout: 5m
  go: "1.23"
  tests: true
  build-tags:
    - integration
    - ignore
  skip-dirs:
    - vendor
    - internal/db/migrations
    - internal/db/seeds
    - build
    - data
    - logs
  skip-files:
    - ".*\\.pb\\.go$"
    - ".*_mock\\.go$"
    - ".*_gen\\.go$"

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  new: false
  exclude-use-default: true
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - bodyclose
        - noctx
    - path: internal/db/migrations/
      linters:
        - gosec
        - errcheck
    - path: internal/db/seeds/
      linters:
        - gosec
        - errcheck
    - text: "G101: Potential hardcoded credentials"
      linters:
        - gosec
    - text: "G112: Potential slowloris attack"
      linters:
        - gosec
      path: cmd/server/main\.go

linters:
  enable:
    # Security linters
    - gosec
    # Standard Go linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - typecheck
    # Additional code quality
    - bodyclose
    - contextcheck
    - durationcheck
    - exhaustive
    - gci
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - gofmt
    - gofumpt
    - goheader
    - goimports
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - grouper
    - importas
    - ireturn
    - lll
    - maintidx
    - makezero
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - revive
    - rowserrcheck
    - sqlclosecheck
    - stylecheck
    - tenv
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl
  disable:
    - depguard
    - exhaustruct
    - forbidigo
    - forcetypeassert
    - funlen
    - gochecksumtype
    - gomnd
    - interfacebloat
    - loggercheck
    - maligned
    - mirror
    - musttag
    - nlreturn
    - paralleltest
    - perfsprint
    - spancheck
    - tagalign
    - tagliatelle
    - varnamelen

linters-settings:
  gosec:
    severity: medium
    confidence: medium
    rules:
      - G101    # Potential hardcoded credentials
      - G102    # Binds to all interfaces
      - G103    # Audit use of unsafe block
      - G104    # Audit errors not checked
      - G106    # Audit the use of ssh.InsecureIgnoreHostKey
      - G107    # Url provided to HTTP request as taint input
      - G108    # Profiling endpoint automatically exposed on /debug/pprof
      - G109    # Potential Integer overflow made by strconv.Atoi result conversion
      - G110    # Potential DoS vulnerability via decompression bomb
      - G111    # Potential directory traversal
      - G112    # Potential slowloris attack
      - G113    # Potential uncontrolled resource consumption
      - G114    # Use of net/http serve function with no ReadHeaderTimeout
      - G201    # SQL query construction using format string
      - G202    # SQL query construction using string concatenation
      - G203    # Use of unescaped data in HTML templates
      - G204    # Audit use of command execution
      - G301    # Poor file permissions
      - G302    # Poor file permissions (chmod)
      - G303    # Creating temp file using predictable path
      - G304    # File path provided as taint input
      - G305    # Directory traversal
      - G401    # Use of weak crypto (DES)
      - G402    # Use of weak crypto (TLS)
      - G403    # Use of weak crypto (RSA)
      - G404    # Use of weak random number
      - G501    # Import blocklist: crypto/md5
      - G502    # Import blocklist: crypto/des
      - G503    # Import blocklist: crypto/rc4
      - G504    # Import blocklist: net/http/cgi
      - G505    # Import blocklist: crypto/sha1
    excludes:
      - G101  # Handled by custom rule above

  gocognit:
    min-complexity: 30
  gocyclo:
    min-complexity: 15
  lll:
    line-length: 120
  nakedret:
    max-func-lines: 30
  nestif:
    min-complexity: 5
  revive:
    severity: warning
    confidence: 0.8
    rules:
      - name: blank-imports
        severity: warning
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
        severity: warning
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
        severity: warning
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
        severity: warning
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
        severity: warning
      - name: unreachable-code
      - name: redefines-builtin-id
  staticcheck:
    checks: ["all", "-SA1019", "-SA4011"]
  wrapcheck:
    ignorePackageGlobs:
      - github.com/pkg/errors
  gci:
    sections:
      - standard
      - default
      - prefix(github.com/soumabali/vexa)
    custom-order: true
    skip-generated: true
  gofumpt:
    extra-rules: true
  misspell:
    locale: US
  govet:
    enable-all: true
    settings:
      shadow:
        strict: true
  noctx:
    exclude-test-files: false
  bodyclose:
    check-returned-error: true

output:
  formats:
    - format: colored-line-number
      path: stdout
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
