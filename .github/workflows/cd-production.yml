# =============================================================================
# vexa — Continuous Delivery (Production)
# Manual deployment with approvals, canary rollout, and rollback support.
# =============================================================================
name: CD — Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: true
        default: ''
      strategy:
        description: 'Deployment strategy'
        required: true
        default: 'canary'
        type: choice
        options:
          - canary
          - blue-green
          - rolling
      canary_weight:
        description: 'Canary traffic weight (%)'
        required: false
        default: '10'
      skip_tests:
        description: 'Skip smoke tests'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  K8S_NAMESPACE: vexa-prod
  ENVIRONMENT: production
  ROLLOUT_TIMEOUT: 10m

jobs:
  # ==========================================================================
  # Pre-Deploy Validation
  # ==========================================================================
  validate:
    name: Validate Deploy Request
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Determine image tag
        id: tag
        run: |
          tag="${{ github.event.inputs.image_tag }}"
          if [ -z "$tag" ]; then
            tag="${{ github.sha }}"
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "Deploying image tag: $tag"

      - name: Verify image exists
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:$tag > /dev/null || { echo "❌ API image not found"; exit 1; }
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:$tag > /dev/null || { echo "❌ Web image not found"; exit 1; }
          echo "✅ Both images verified"

      - name: Verify staging passed
        run: |
          echo "ℹ️ Ensure the selected image tag was previously deployed to staging and passed smoke tests."

  # ==========================================================================
  # Deploy to Production
  # ==========================================================================
  deploy:
    name: Deploy to Production
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://vexa.local
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Authenticate to K8s
        run: |
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
          kubectl config current-context
          kubectl get nodes

      - name: Pre-deploy snapshot
        run: |
          export KUBECONFIG=kubeconfig
          echo "=== Current deployments ==="
          kubectl get deployments -n ${{ env.K8S_NAMESPACE }} -o wide
          echo "=== Current pods ==="
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          echo "=== Current ingress ==="
          kubectl get ingress -n ${{ env.K8S_NAMESPACE }}
          # Save current revision for rollback
          rev=$(kubectl get deployment/api -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.metadata.annotations.deployment\.kubernetes\.io/revision}')
          echo "current-api-revision=$rev" >> $GITHUB_OUTPUT
        id: snapshot

      - name: Deploy via Kustomize
        run: |
          export KUBECONFIG=kubeconfig
          cd infra/k8s/production
          kustomize edit set image api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ needs.validate.outputs.image-tag }}
          kustomize edit set image web=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ needs.validate.outputs.image-tag }}
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/api -n ${{ env.K8S_NAMESPACE }} --timeout ${{ env.ROLLOUT_TIMEOUT }}
          kubectl rollout status deployment/web -n ${{ env.K8S_NAMESPACE }} --timeout ${{ env.ROLLOUT_TIMEOUT }}

      - name: Post-deploy health check
        if: ${{ !github.event.inputs.skip_tests }}
        run: |
          export KUBECONFIG=kubeconfig
          # Port-forward for smoke tests
          kubectl port-forward svc/api 8080:80 -n ${{ env.K8S_NAMESPACE }} &
          sleep 5
          for i in 1 2 3; do
            curl -sf http://localhost:8080/health && echo "✅ Health check passed" && break
            echo "Retry $i..."
            sleep 5
          done
          curl -sf http://localhost:8080/ready || { echo "❌ Readiness check failed"; exit 1; }
          pkill -f port-forward || true

      - name: Security headers check
        if: ${{ !github.event.inputs.skip_tests }}
        run: |
          export KUBECONFIG=kubeconfig
          kubectl port-forward svc/web 3000:80 -n ${{ env.K8S_NAMESPACE }} &
          sleep 3
          headers=$(curl -sI http://localhost:3000)
          echo "$headers" | grep -i "strict-transport-security" || echo "⚠️ HSTS header missing"
          echo "$headers" | grep -i "x-content-type-options" || echo "⚠️ X-Content-Type-Options header missing"
          echo "$headers" | grep -i "x-frame-options" || echo "⚠️ X-Frame-Options header missing"
          pkill -f port-forward || true

      - name: Record deployment
        run: |
          export KUBECONFIG=kubeconfig
          kubectl annotate deployment/api -n ${{ env.K8S_NAMESPACE }} \
            deployment.vexa.local/deployed-at="$(date -Iseconds)" \
            deployment.vexa.local/deployed-by="${{ github.actor }}" \
            deployment.vexa.local/git-sha="${{ needs.validate.outputs.image-tag }}" \
            --overwrite
          kubectl annotate deployment/web -n ${{ env.K8S_NAMESPACE }} \
            deployment.vexa.local/deployed-at="$(date -Iseconds)" \
            deployment.vexa.local/deployed-by="${{ github.actor }}" \
            deployment.vexa.local/git-sha="${{ needs.validate.outputs.image-tag }}" \
            --overwrite

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        if: always()
        with:
          payload: |
            {
              "text": "🚀 *Production deploy* ${{ job.status == 'success' && 'succeeded ✅' || 'failed ❌' }} — tag \`${{ needs.validate.outputs.image-tag }}\` by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ==========================================================================
  # Post-Deploy Verification
  # ==========================================================================
  verify:
    name: Post-Deploy Verification
    needs: deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Authenticate to K8s
        run: |
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Extended smoke tests
        run: |
          export KUBECONFIG=kubeconfig
          kubectl port-forward svc/api 8080:80 -n ${{ env.K8S_NAMESPACE }} &
          sleep 5
          curl -sf http://localhost:8080/health
          curl -sf http://localhost:8080/ready
          curl -sf http://localhost:8080/metrics | head -5
          curl -sf http://localhost:8080/api/v1/health || true
          pkill -f port-forward || true

      - name: Check pod status
        run: |
          export KUBECONFIG=kubeconfig
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide
          # Verify no CrashLoopBackOff
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} | grep -i crashloop && { echo "❌ CrashLoopBackOff detected"; exit 1; } || echo "✅ No crash loops"

      - name: Check resource usage
        run: |
          export KUBECONFIG=kubeconfig
          kubectl top pods -n ${{ env.K8S_NAMESPACE }} 2>/dev/null || echo "⚠️ metrics-server not available"
