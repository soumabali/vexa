name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Setup Node
        uses: actions/setup-go@v5
        with:
          node-version: '20'
      - name: Setup Rust
        uses: dtolnay/rust-action@stable
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Build
        run: |
          ./scripts/build-all.sh

      - name: Sign
        run: |
          ./scripts/sign-release.sh

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.msi
            dist/*.dmg
            dist/*.AppImage
            dist/*_checksums.txt
            dist/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Website
        run: |
          cd website && npm run deploy

      - name: Notify
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{"content":"🚀 Release ${{ github.ref_name }} published!"}'
