name: SCA Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday 03:00 UTC

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'
  RUST_VERSION: 'stable'

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: write

jobs:
  snyk:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Snyk
        run: npm install -g snyk

      - name: Snyk Auth
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Test - Go
        run: |
          cd apps/api
          snyk test --file=go.mod --sarif-file-output=snyk-go.sarif --severity-threshold=high || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Test - Node.js
        run: |
          cd apps/web
          snyk test --file=package-lock.json --sarif-file-output=snyk-node.sarif --severity-threshold=high || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Test - Rust
        run: |
          cd packages/ssh-core
          snyk test --file=Cargo.toml --sarif-file-output=snyk-rust.sarif --severity-threshold=high || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code Analysis
        run: |
          snyk code test --sarif-file-output=snyk-code.sarif --severity-threshold=high || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk SARIF (Go)
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('apps/api/snyk-go.sarif') != ''
        with:
          sarif_file: apps/api/snyk-go.sarif
          category: snyk-go

      - name: Upload Snyk SARIF (Node)
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('apps/web/snyk-node.sarif') != ''
        with:
          sarif_file: apps/web/snyk-node.sarif
          category: snyk-node

      - name: Upload Snyk SARIF (Rust)
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('packages/ssh-core/snyk-rust.sarif') != ''
        with:
          sarif_file: packages/ssh-core/snyk-rust.sarif
          category: snyk-rust

      - name: Upload Snyk Code SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('snyk-code.sarif') != ''
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      - name: Check Snyk critical findings
        if: github.event_name == 'pull_request'
        run: |
          SEVERITY_FILES="apps/api/snyk-go.sarif apps/web/snyk-node.sarif packages/ssh-core/snyk-rust.sarif snyk-code.sarif"
          TOTAL_CRITICAL=0
          for f in $SEVERITY_FILES; do
            if [ -f "$f" ]; then
              COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' "$f" 2>/dev/null || echo "0")
              TOTAL_CRITICAL=$((TOTAL_CRITICAL + COUNT))
            fi
          done
          echo "Snyk total critical findings: $TOTAL_CRITICAL"
          if [ "$TOTAL_CRITICAL" -gt 0 ]; then
            echo "::error::Critical vulnerabilities found by Snyk. Failing build."
            exit 1
          fi

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Run Trivy vulnerability scanner (Filesystem - JSON)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-fs-results.json'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy FS SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

      - name: Check Trivy critical findings
        if: github.event_name == 'pull_request'
        run: |
          if [ -f trivy-fs-results.json ]; then
            CRITICAL_COUNT=$(jq '[.Results[]? | select(.Vulnerabilities != null) | .Vulnerabilities[] | select(.Severity == "CRITICAL")] | length' trivy-fs-results.json 2>/dev/null || echo "0")
            echo "Trivy critical findings: $CRITICAL_COUNT"
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "::error::Critical vulnerabilities found by Trivy filesystem scan. Failing build."
              exit 1
            fi
          fi

      - name: Upload Trivy FS JSON artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-fs-results
          path: trivy-fs-results.json
          retention-days: 30

  trivy-image:
    name: Trivy Container Image Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        image:
          - context: ./apps/api
            name: vexa-api
            dockerfile: Dockerfile
          - context: ./apps/web
            name: vexa-web
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.context }}/${{ matrix.image.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image.name }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.image.name }}:scan'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Run Trivy vulnerability scanner (Image - JSON)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.image.name }}:scan'
          format: 'json'
          output: 'trivy-image-results.json'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy Image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image-${{ matrix.image.name }}

      - name: Check Trivy image critical findings
        if: github.event_name == 'pull_request'
        run: |
          if [ -f trivy-image-results.json ]; then
            CRITICAL_COUNT=$(jq '[.Results[]? | select(.Vulnerabilities != null) | .Vulnerabilities[] | select(.Severity == "CRITICAL")] | length' trivy-image-results.json 2>/dev/null || echo "0")
            echo "Trivy image critical findings for ${{ matrix.image.name }}: $CRITICAL_COUNT"
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "::error::Critical vulnerabilities found in ${{ matrix.image.name }} image. Failing build."
              exit 1
            fi
          fi

      - name: Upload Trivy Image JSON artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-results-${{ matrix.image.name }}
          path: trivy-image-results.json
          retention-days: 30

  sca-summary:
    name: SCA Summary
    needs: [snyk, trivy-fs, trivy-image]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: SCA Results
        run: |
          echo "## SCA Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Snyk          | ${{ needs.snyk.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy FS      | ${{ needs.trivy-fs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Image   | ${{ needs.trivy-image.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Block PR on failure
        if: >
          github.event_name == 'pull_request' &&
          (needs.snyk.result == 'failure' ||
           needs.trivy-fs.result == 'failure' ||
           needs.trivy-image.result == 'failure')
        run: |
          echo "::error::SCA scanning detected critical vulnerabilities. PR blocked."
          exit 1
