name: CodeQL Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday 03:00 UTC

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
            paths: apps/api
          - language: javascript
            build-mode: none
            paths: apps/web
          - language: rust
            build-mode: autobuild
            paths: packages/ssh-core
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-action@stable

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
          output: codeql-results-${{ matrix.language }}

      - name: Upload CodeQL SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('codeql-results-${{ matrix.language }}/*.sarif') != ''
        with:
          sarif_file: codeql-results-${{ matrix.language }}
          category: codeql-${{ matrix.language }}

      - name: Check critical findings
        if: github.event_name == 'pull_request'
        run: |
          SARIF_FILE=$(find codeql-results-${{ matrix.language }} -name "*.sarif" 2>/dev/null | head -1)
          if [ -n "$SARIF_FILE" ]; then
            CRITICAL=$(jq '[.runs[].results[] | select(.level == "error")] | length' "$SARIF_FILE" || echo "0")
            echo "CodeQL ${{ matrix.language }} critical findings: $CRITICAL"
            if [ "$CRITICAL" -gt 0 ]; then
              echo "::error::CodeQL found $CRITICAL critical issue(s) in ${{ matrix.language }}."
              exit 1
            fi
          fi
