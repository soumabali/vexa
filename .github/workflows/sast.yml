name: SAST Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday 03:00 UTC

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
            p/golang
            p/javascript
            p/rust
            p/typescript
            p/react
          generateSarif: '1'
          sarifOutput: semgrep-results.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Check Semgrep critical findings
        if: github.event_name == 'pull_request'
        run: |
          if [ -f semgrep-results.sarif ]; then
            CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' semgrep-results.sarif || echo "0")
            HIGH_COUNT=$(jq '[.runs[].results[] | select(.level == "warning")] | length' semgrep-results.sarif || echo "0")
            echo "Critical findings: $CRITICAL_COUNT"
            echo "High findings: $HIGH_COUNT"
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "::error::Critical vulnerabilities found by Semgrep. Failing build."
              exit 1
            fi
          fi

  gosec:
    name: GoSec Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run GoSec
        uses: securego/gosec@master
        with:
          args: >-
            -no-fail
            -fmt sarif
            -out gosec-results.sarif
            -exclude-dir=tests
            -exclude-dir=vendor
            ./apps/api/...

      - name: Upload GoSec SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif
          category: gosec

      - name: Check GoSec critical findings
        if: github.event_name == 'pull_request'
        run: |
          if [ -f gosec-results.sarif ]; then
            CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' gosec-results.sarif || echo "0")
            echo "GoSec critical findings: $CRITICAL_COUNT"
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "::error::Critical vulnerabilities found by GoSec. Failing build."
              exit 1
            fi
          fi

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript, rust]
        include:
          - language: go
            paths: apps/api
          - language: javascript
            paths: apps/web
          - language: rust
            paths: packages/ssh-core
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
          output: codeql-results-${{ matrix.language }}

  sast-summary:
    name: SAST Summary
    needs: [semgrep, gosec, codeql]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: SAST Results
        run: |
          echo "## SAST Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep | ${{ needs.semgrep.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GoSec   | ${{ needs.gosec.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL  | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Block PR on failure
        if: >
          github.event_name == 'pull_request' &&
          (needs.semgrep.result == 'failure' ||
           needs.gosec.result == 'failure' ||
           needs.codeql.result == 'failure')
        run: |
          echo "::error::SAST scanning detected critical vulnerabilities. PR blocked."
          exit 1
