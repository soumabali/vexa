# =============================================================================
# vexa — Continuous Integration
# Triggered on: push to main/develop, PRs, nightly cron
# Classification: Security-Critical
# =============================================================================
name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GO_VERSION: '1.25'
  NODE_VERSION: '22'
  RUST_VERSION: 'stable'
  TRIVY_VERSION: '0.50.0'

jobs:
  # ==========================================================================
  # vexa Application Context + Workflow Audit
  # ==========================================================================
  vexa-context-check:
    name: vexa Application Context Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run application-level audit
        run: bash scripts/audit-vexa.sh
        continue-on-error: true

      - name: Verify application context files
        run: |
          test -f CLAUDE.md
          test -f README.md
          test -f .claude/settings.json
          test -f .claude/rules/hermes-skills.md
          test -f docker-compose.prod.yml
          grep -q "/backups:/backups" docker-compose.prod.yml
          grep -q "vexa-backup" docker-compose.prod.yml
          test -f scripts/backup.sh
          test -f scripts/backup.crontab
          test -f Dockerfile.backup

  # ==========================================================================
  # Claude Code Response Schema Validation (bot/agent PRs)
  # ==========================================================================
  agent-response-validation:
    name: Claude Code Response Schema Validation
    needs: vexa-context-check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Fetch response schema from root orchestrator
        run: |
          curl -sL https://raw.githubusercontent.com/soumabali/vexa-root/main/00-meta/claude-response-schema.json -o /tmp/claude-response-schema.json
          test -s /tmp/claude-response-schema.json

      - name: Validate any in-repo Claude Code response files
        run: |
          SCHEMA=/tmp/claude-response-schema.json
          FOUND=0
          FAILED=0
          for f in $(find . -type f \( -name '*.claude.json' -o -name 'claude-response*.json' -o -path '*/.claude/responses/*.json' \) 2>/dev/null); do
            FOUND=1
            echo "Validating $f ..."
            python3 - <<PY
          import json, sys
          from jsonschema import validate, ValidationError
          with open('${SCHEMA}') as s:
              schema = json.load(s)
          with open('${f}') as r:
              data = json.load(r)
          if isinstance(data, dict) and 'result' in data and isinstance(data['result'], str):
              try:
                  data = json.loads(data['result'])
              except json.JSONDecodeError:
                  print(f"ERROR: {f} has non-JSON 'result' field")
                  sys.exit(1)
          try:
              validate(instance=data, schema=schema)
          except ValidationError as e:
              print(f"ERROR: {f} schema validation failed: {e.message}")
              sys.exit(1)
          confirmation = data.get('compliance', {}).get('confirmation', [])
          if not all(confirmation):
              missing = [i+1 for i, v in enumerate(confirmation) if not v]
              print(f"ERROR: {f} compliance confirmation missing at points: {missing}")
              sys.exit(1)
          scope = data.get('scope', {})
          if not scope.get('only_02_application') or not scope.get('no_push') or not scope.get('no_root_edit'):
              print(f"ERROR: {f} scope constraints not satisfied")
              sys.exit(1)
          print(f"OK: {f} is compliant")
          PY
            if [ $? -ne 0 ]; then
              FAILED=1
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "No Claude Code response files found in this PR — schema validation skipped."
          fi
          if [ "$FAILED" -ne 0 ]; then
            echo "One or more Claude Code response files failed schema validation."
            exit 1
          fi

  # ==========================================================================
  # Lint & Format
  # ==========================================================================
  lint:
    name: Lint & Format
    needs: vexa-context-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install tools
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest || true
          cargo install cargo-deny 2>/dev/null || true

      - name: Lint Go (api)
        run: |
          cd apps/api
          gofmt -d .
          golangci-lint run --timeout=5m ./... || true

      - name: Lint TypeScript (web)
        run: |
          cd apps/web
          npm ci
          npm run lint || true

      - name: TypeScript type check
        run: |
          cd apps/web
          npm run type-check || true

      - name: Lint Rust (ssh-core)
        run: |
          cd packages/ssh-core
          cargo clippy -- -D warnings || true

      - name: Lint Rust (desktop)
        run: |
          cd apps/desktop
          cargo clippy -- -D warnings || true

      - name: Lint Shell scripts
        run: |
          find scripts -name "*.sh" -exec shellcheck {} + 2>/dev/null || true

  # ==========================================================================
  # Unit & Integration Tests
  # ==========================================================================
  test:
    name: Test Suite
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vexa
          POSTGRES_PASSWORD: test
          POSTGRES_DB: vexa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Backend (Go)
        run: |
          cd apps/api
          go test -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -n 1 >> $GITHUB_STEP_SUMMARY
        env:
          DATABASE_URL: postgres://vexa:test@localhost:5432/vexa_test?sslmode=disable
          REDIS_ADDR: localhost:6379
          JWT_SECRET: test-jwt-secret-min-32-bytes-long!!
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-bytes!!
          ENCRYPTION_KEY: test-encryption-key-32-bytes!!

      - name: Test Rust Core
        run: |
          cd packages/ssh-core
          cargo test --lib

      - name: Test Rust Desktop
        run: |
          cd apps/desktop
          cargo test --lib || true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/api/coverage.out
            packages/ssh-core/target/debug/coverage/

  # ==========================================================================
  # Build & Package
  # ==========================================================================
  build:
    name: Build & Package
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: api
            dockerfile: Dockerfile
            context: ./apps/api
          - app: web
            dockerfile: Dockerfile
            context: ./apps/web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short

      - name: Build image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.app }},push-by-digest=${{ github.event_name != 'pull_request' }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "${digest}" > /tmp/digests/${{ matrix.app }}-${{ github.run_id }}.txt

      - name: Upload digests
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.app }}
          path: /tmp/digests/*.txt
          if-no-files-found: error

  # ==========================================================================
  # Security Scanning (SAST + Container)
  # ==========================================================================
  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest || true
          go install github.com/google/go-licenses@latest || true

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: SAST (gosec)
        run: |
          cd apps/api
          gosec -fmt sarif -out gosec.sarif ./... || true

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: apps/api/gosec.sarif

      - name: Dependency scan (Trivy filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-fs.sarif'
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif

      - name: Container scan (Trivy)
        run: |
          # Scan built images if available
          for app in api web; do
            tag="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${app}:${{ github.sha }}"
            if docker pull "$tag" 2>/dev/null; then
              trivy image --severity CRITICAL,HIGH --exit-code 1 "$tag" || true
            fi
          done
        continue-on-error: true

      - name: License audit
        run: |
          cd apps/api
          go-licenses check ./... --allowed_licenses=MIT,Apache-2.0,BSD-3-Clause,BSD-2-Clause 2>/dev/null || true
        continue-on-error: true

