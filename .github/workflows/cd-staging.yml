# =============================================================================
# SSH Manager — Continuous Delivery (Staging)
# Auto-deploy on every push to develop branch
# =============================================================================
name: CD — Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest SHA)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  K8S_NAMESPACE: vexa-staging
  ENVIRONMENT: staging
  HELM_TIMEOUT: 5m

jobs:
  # ==========================================================================
  # Build & Push Images
  # ==========================================================================
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export version
        id: version
        run: echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT

  # ==========================================================================
  # Security Scan Images
  # ==========================================================================
  scan-images:
    name: Scan Images
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-api.sarif'

      - name: Scan Web image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-web.sarif'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api.sarif

  # ==========================================================================
  # Deploy to Staging
  # ==========================================================================
  deploy:
    name: Deploy to Staging
    needs: [build-push, scan-images]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.vexa.local
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Authenticate to K8s
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
          kubectl config current-context
          kubectl get nodes

      - name: Deploy via Kustomize
        run: |
          export KUBECONFIG=kubeconfig
          # Update image tags in overlay
          cd infra/k8s/staging
          kustomize edit set image api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}
          kustomize edit set image web=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }}
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/api -n ${{ env.K8S_NAMESPACE }} --timeout ${{ env.HELM_TIMEOUT }}
          kubectl rollout status deployment/web -n ${{ env.K8S_NAMESPACE }} --timeout ${{ env.HELM_TIMEOUT }}

      - name: Smoke tests
        run: |
          export KUBECONFIG=kubeconfig
          # Port-forward for smoke tests
          kubectl port-forward svc/api 8080:80 -n ${{ env.K8S_NAMESPACE }} &
          sleep 5
          curl -sf http://localhost:8080/health || exit 1
          curl -sf http://localhost:8080/ready || exit 1
          pkill -f port-forward || true

      - name: Verify metrics endpoint
        run: |
          export KUBECONFIG=kubeconfig
          kubectl port-forward svc/api 9090:9090 -n ${{ env.K8S_NAMESPACE }} &
          sleep 3
          curl -sf http://localhost:9090/metrics | head -5
          pkill -f port-forward || true

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        if: always()
        with:
          payload: |
            {
              "text": "🚀 Staging deploy ${{ job.status == 'success' && 'succeeded ✅' || 'failed ❌' }} — \`${{ github.sha }}\`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
