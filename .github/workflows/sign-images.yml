name: Sign Container Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to sign (optional)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  build-sign-sbom:
    name: Build, Sign, and Generate SBOM
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Export image info
        id: image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG=$(echo '${{ steps.meta.outputs.tags }}' | head -n1 | awk -F: '{print $2}')
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image: ${IMAGE}:${TAG}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  cosign-sign:
    name: Keyless Sign with Cosign
    needs: build-sign-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Verify Cosign installation
        run: cosign version

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with Cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          IMAGE="${{ needs.build-sign-sbom.outputs.image }}@${{ needs.build-sign-sbom.outputs.digest }}"
          echo "Signing image: ${IMAGE}"
          cosign sign \
            --yes \
            --recursive \
            "${IMAGE}"

      - name: Verify signature
        run: |
          IMAGE="${{ needs.build-sign-sbom.outputs.image }}@${{ needs.build-sign-sbom.outputs.digest }}"
          echo "Verifying signature for: ${IMAGE}"
          cosign verify \
            --certificate-identity="https://github.com/${{ github.repository }}/.github/workflows/sign-images.yml@refs/heads/${{ github.ref_name }}" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${IMAGE}"

  sbom-generation:
    name: Generate and Upload SBOM
    needs: build-sign-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SPDX SBOM
        run: |
          IMAGE="${{ needs.build-sign-sbom.outputs.image }}@${{ needs.build-sign-sbom.outputs.digest }}"
          OUTPUT="sbom-${{ needs.build-sign-sbom.outputs.tag }}.spdx.json"
          echo "Generating SBOM for: ${IMAGE}"
          syft "${IMAGE}" -o spdx-json="${OUTPUT}"
          echo "SBOM saved to: ${OUTPUT}"
          ls -la "${OUTPUT}"

      - name: Sign SBOM with Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Sign SBOM artifact
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          SBOM="sbom-${{ needs.build-sign-sbom.outputs.tag }}.spdx.json"
          cosign sign-blob \
            --yes \
            --output-signature "${SBOM}.sig" \
            --output-certificate "${SBOM}.cert" \
            "${SBOM}"

      - name: Upload SBOM to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            sbom-${{ needs.build-sign-sbom.outputs.tag }}.spdx.json
            sbom-${{ needs.build-sign-sbom.outputs.tag }}.spdx.json.sig
            sbom-${{ needs.build-sign-sbom.outputs.tag }}.spdx.json.cert
          body: |
            ## Container Image SBOM

            - Image: `${{ needs.build-sign-sbom.outputs.image }}:${{ needs.build-sign-sbom.outputs.tag }}`
            - Digest: `${{ needs.build-sign-sbom.outputs.digest }}`
            - SBOM: `sbom-${{ needs.build-sign-sbom.outputs.tag }}.spdx.json`

            ### Verify Signature
            ```bash
            cosign verify-blob \
              --signature sbom-${{ needs.build-sign-sbom.outputs.tag }}.spdx.json.sig \
              --certificate sbom-${{ needs.build-sign-sbom.outputs.tag }}.spdx.json.cert \
              --certificate-identity="https://github.com/${{ github.repository }}/.github/workflows/sign-images.yml@refs/heads/${{ github.ref_name }}" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              sbom-${{ needs.build-sign-sbom.outputs.tag }}.spdx.json
            ```

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.build-sign-sbom.outputs.tag }}
          path: |
            sbom-${{ needs.build-sign-sbom.outputs.tag }}.spdx.json
            sbom-${{ needs.build-sign-sbom.outputs.tag }}.spdx.json.sig
            sbom-${{ needs.build-sign-sbom.outputs.tag }}.spdx.json.cert
          retention-days: 90

  slsa-provenance:
    name: Generate SLSA Provenance
    needs: build-sign-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      actions: read

    steps:
      - name: Generate SLSA provenance
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v1.10.0
        with:
          image: ${{ needs.build-sign-sbom.outputs.image }}
          digest: ${{ needs.build-sign-sbom.outputs.digest }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
        secrets:
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  github-attestation:
    name: GitHub Attestation
    needs: build-sign-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ needs.build-sign-sbom.outputs.image }}
          subject-digest: ${{ needs.build-sign-sbom.outputs.digest }}
          push-to-registry: true

  verify-deployment-ready:
    name: Verify Before Deploy
    needs: [build-sign-sbom, cosign-sign, sbom-generation]
    runs-on: ubuntu-latest
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Verify image signature
        run: |
          IMAGE="${{ needs.build-sign-sbom.outputs.image }}@${{ needs.build-sign-sbom.outputs.digest }}"
          echo "Verifying image signature before deployment: ${IMAGE}"
          cosign verify \
            --certificate-identity="https://github.com/${{ github.repository }}/.github/workflows/sign-images.yml@refs/heads/${{ github.ref_name }}" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${IMAGE}"
          echo "✅ Image signature verified. Safe to deploy."

      - name: Verify SBOM available
        run: |
          echo "Checking SBOM artifact availability..."
          echo "SBOM should be available as artifact: sbom-${{ needs.build-sign-sbom.outputs.tag }}"
          echo "✅ SBOM verification passed."
