# Semgrep SAST Configuration
# https://semgrep.dev/docs/semgrep-code/custom-rules-and-rulesets

rules:
  # OWASP Top 10 rules
  - id: owasp-top-ten
    languages: [go, javascript, typescript, rust]
    patterns:
      - pattern-either:
          - pattern: |
              $OBJ.Query($X)
          - pattern: |
              $OBJ.Exec($X)
    message: "Potential SQL injection vulnerability. Use parameterized queries."
    severity: ERROR
    metadata:
      owasp: "A01:2021 – Broken Access Control"
      cwe: "CWE-89"

  # SSH Manager specific rules
  - id: vexa-hardcoded-secrets
    languages: [go, javascript, typescript, rust]
    patterns:
      - pattern-regex: '(?i)(api[_-]?key|secret[_-]?key|password|token)\s*=\s*["\'][^"\']{8,}["\']'
      - pattern-not-regex: '(?i)(example|placeholder|changeme|dummy|test)'
    message: "Hardcoded secret detected. Use environment variables or a secrets manager."
    severity: ERROR
    metadata:
      owasp: "A07:2021 – Identification and Authentication Failures"
      cwe: "CWE-798"

  - id: vexa-insecure-crypto
    languages: [go, rust]
    patterns:
      - pattern-either:
          - pattern: md5.New()
          - pattern: sha1.New()
          - pattern: crypto/des.NewCipher(...)
    message: "Insecure cryptographic algorithm detected. Use AES-256-GCM or ChaCha20-Poly1305."
    severity: ERROR
    metadata:
      owasp: "A02:2021 – Cryptographic Failures"
      cwe: "CWE-327"

  - id: vexa-weak-random
    languages: [go, rust]
    patterns:
      - pattern-either:
          - pattern: math/rand.Intn(...)
          - pattern: rand::thread_rng()
    message: "Weak random number generator for security context. Use crypto/rand or rand::rngs::OsRng."
    severity: WARNING
    metadata:
      owasp: "A02:2021 – Cryptographic Failures"
      cwe: "CWE-338"

  - id: vexa-insecure-tls
    languages: [go]
    patterns:
      - pattern: |
          tls.Config{InsecureSkipVerify: true}
    message: "Insecure TLS configuration - skipping certificate verification."
    severity: ERROR
    metadata:
      owasp: "A02:2021 – Cryptographic Failures"
      cwe: "CWE-295"

  - id: vexa-csrf-missing
    languages: [javascript, typescript]
    patterns:
      - pattern: |
          fetch($URL, {method: $METHOD, body: $BODY})
      - pattern-not-inside: |
          fetch($URL, {..., headers: {..., "X-CSRF-Token": ...}, ...})
    message: "Potential missing CSRF protection on state-changing request."
    severity: WARNING
    metadata:
      owasp: "A01:2021 – Broken Access Control"
      cwe: "CWE-352"

  - id: vexa-race-condition
    languages: [go, rust]
    patterns:
      - pattern-either:
          - pattern: |
              go func() { $X }()
          - pattern: |
              tokio::spawn(async { $X })
    message: "Potential race condition. Ensure proper synchronization with mutexes or channels."
    severity: WARNING
    metadata:
      cwe: "CWE-362"

  - id: vexa-ssrf
    languages: [go, javascript, typescript]
    patterns:
      - pattern: |
          http.Get($URL)
      - pattern-not: |
          http.Get("https://api.vexa.local/...")
    message: "Potential Server-Side Request Forgery (SSRF). Validate and whitelist URLs."
    severity: ERROR
    metadata:
      owasp: "A10:2021 – Server-Side Request Forgery"
      cwe: "CWE-918"

  - id: vexa-command-injection
    languages: [go, rust]
    patterns:
      - pattern-either:
          - pattern: |
              exec.Command($BIN, $ARGS...)
          - pattern: |
              std::process::Command::new($BIN)
    message: "Potential command injection. Never pass user input directly to shell commands."
    severity: ERROR
    metadata:
      owasp: "A03:2021 – Injection"
      cwe: "CWE-78"

  - id: vexa-path-traversal
    languages: [go, javascript, typescript, rust]
    patterns:
      - pattern: |
          os.Open($PATH)
      - pattern-not: |
          os.Open(filepath.Join("/safe/base", $PATH))
    message: "Potential path traversal. Validate and sanitize file paths."
    severity: WARNING
    metadata:
      owasp: "A01:2021 – Broken Access Control"
      cwe: "CWE-22"

  - id: vexa-log-sensitive-data
    languages: [go, javascript, typescript, rust]
    patterns:
      - pattern: |
          log.Println($X)
      - pattern-regex: '(?i)(password|secret|token|key|credential)'
    message: "Potential logging of sensitive data. Avoid logging secrets."
    severity: WARNING
    metadata:
      owasp: "A09:2021 – Security Logging and Monitoring Failures"
      cwe: "CWE-532"

  - id: vexa-jwt-none-alg
    languages: [go, javascript, typescript]
    patterns:
      - pattern: |
          jwt.SigningMethodNone
      - pattern: |
          alg: "none"
    message: "JWT 'none' algorithm is insecure. Always use HS256, RS256, or ES256."
    severity: ERROR
    metadata:
      owasp: "A02:2021 – Cryptographic Failures"
      cwe: "CWE-327"

paths:
  include:
    - apps/api/**/*.go
    - apps/web/**/*.ts
    - apps/web/**/*.tsx
    - apps/desktop/**/*.rs
    - packages/ssh-core/**/*.rs
    - apps/mobile/**/*.dart
  exclude:
    - "**/vendor/**"
    - "**/node_modules/**"
    - "**/.next/**"
    - "**/target/**"
    - "**/tests/**"
    - "**/*_test.go"
    - "**/*_test.rs"
    - "**/__tests__/**"
