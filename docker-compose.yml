version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-vexa}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-vexa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/internal/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vexa}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    environment:
      - DATABASE_URL=postgres://${DB_USER:-vexa}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-vexa}?sslmode=disable
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-vexa}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_NAME=${DB_NAME:-vexa}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENV=${ENV:-development}
    ports:
      - "8080:8080"
    volumes:
      - ./apps/api:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: air

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NODE_ENV=development
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

  ssh-core:
    build:
      context: ./packages/ssh-core
      dockerfile: Dockerfile
    volumes:
      - ./packages/ssh-core:/app
    command: cargo test

volumes:
  postgres_data:
  redis_data:
  go_mod_cache:
